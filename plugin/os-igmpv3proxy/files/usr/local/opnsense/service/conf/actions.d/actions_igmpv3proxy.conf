[generate]
command:/usr/local/opnsense/scripts/OPNsense/Igmpv3proxy/generate_config.py
parameters:
type:script_output
message:generating igmpv3proxy config

[start]
command:/bin/sh -c "/usr/local/opnsense/scripts/OPNsense/Igmpv3proxy/generate_config.py && (/usr/sbin/service igmpv3proxy onestatus >/dev/null 2>&1 || /usr/sbin/service igmpv3proxy onestart)"
parameters:
type:script_output
message:starting igmpv3proxy

[stop]
command:/bin/sh -c "/usr/sbin/service igmpv3proxy onestatus >/dev/null 2>&1 && /usr/sbin/service igmpv3proxy onestop || true"
parameters:
type:script_output
message:stopping igmpv3proxy

[restart]
command:/bin/sh -c "/usr/local/opnsense/scripts/OPNsense/Igmpv3proxy/generate_config.py && (/usr/sbin/service igmpv3proxy onestatus >/dev/null 2>&1 && /usr/sbin/service igmpv3proxy onerestart || /usr/sbin/service igmpv3proxy onestart)"
parameters:
type:script_output
message:restarting igmpv3proxy

[reload]
command:/bin/sh -c "/usr/local/opnsense/scripts/OPNsense/Igmpv3proxy/generate_config.py && (/usr/sbin/service igmpv3proxy onestatus >/dev/null 2>&1 && /usr/sbin/service igmpv3proxy onerestart || true)"
parameters:
type:script_output
message:reloading igmpv3proxy

[status]
command:/bin/sh -c "/usr/sbin/service igmpv3proxy status || true"
parameters:
type:script_output
message:status igmpv3proxy

[routes]
command:/bin/sh -c "/usr/local/sbin/igmpv3proxy -c -r 2>&1 || true"
parameters:
type:script_output
message:showing igmpv3proxy routes

[interfaces]
command:/bin/sh -c "/usr/local/sbin/igmpv3proxy -c -i 2>&1 || true"
parameters:
type:script_output
message:showing igmpv3proxy interfaces

[filters]
command:/bin/sh -c "/usr/local/sbin/igmpv3proxy -c -f 2>&1 || true"
parameters:
type:script_output
message:showing igmpv3proxy filters
